[build-system]
requires = ["hatchling>=1.28,<2"]
build-backend = "hatchling.build"

[project]
name = "kisnet-ytm"
version = "0.1.1"
description = "Native Python access to KIS-NET YTM Matrix data."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE.md"]
authors = [{ name = "Sejun Park" }]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Typing :: Typed",
]
dependencies = [
  "curl-cffi>=0.13,<1",
  "pydantic>=2.12,<3",
]

[project.urls]
Repository = "https://github.com/sjunepark/ytm"

[dependency-groups]
dev = [
  "build>=1.4,<2",
  "hatchling>=1.28,<2",
  "pytest>=9.1,<10",
  "ruff>=0.15,<0.16",
  "ty==0.0.60",
]

[tool.hatch.build.targets.wheel]
packages = ["src/kisnet_ytm"]

[tool.hatch.build.hooks.custom]
path = "hatch_build.py"

[tool.pytest.ini_options]
addopts = "-ra --strict-markers"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["B", "E", "F", "I", "RUF", "SIM", "UP"]

[tool.ty.environment]
python-version = "3.11"

[tool.ty.src]
include = ["src", "tests"]

[tool.uv]
package = true
