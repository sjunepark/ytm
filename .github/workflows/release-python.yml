name: Release PyPI

on:
  push:
    tags:
      - "python-v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing Python component tag, for example python-v0.2.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pypi-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.package.outputs.package_version }}
      source_tag: ${{ steps.package.outputs.source_tag }}
      source_sha: ${{ steps.package.outputs.source_sha }}

    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"

      - name: Validate component metadata
        id: package
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          PACKAGE_VERSION=$(python -c 'import tomllib; print(tomllib.load(open("packages/python/pyproject.toml", "rb"))["project"]["version"])')
          NODE_VERSION=$(node -p "require('./packages/node/package.json').version")

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            SOURCE_TAG="$DISPATCH_TAG"
          else
            SOURCE_TAG="$GITHUB_REF_NAME"
          fi
          SOURCE_SHA=$(git rev-parse HEAD)

          if [ "$PACKAGE_VERSION" != "$NODE_VERSION" ]; then
            echo "Python $PACKAGE_VERSION does not match Node $NODE_VERSION." >&2
            exit 1
          fi
          if [ "$SOURCE_TAG" != "python-v$PACKAGE_VERSION" ]; then
            echo "Tag $SOURCE_TAG does not match Python version python-v$PACKAGE_VERSION." >&2
            exit 1
          fi

          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "source_tag=$SOURCE_TAG" >> "$GITHUB_OUTPUT"
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"

  python_validation:
    runs-on: ubuntu-latest
    needs: metadata

    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
          ref: ${{ needs.metadata.outputs.source_sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.21"
          enable-cache: true
          cache-dependency-glob: packages/python/uv.lock

      - name: Install locked Python environment
        run: uv sync --locked
        working-directory: packages/python

      - name: Validate Python package
        run: |
          uv run --locked ruff format --check .
          uv run --locked ruff check .
          uv run --locked ty check
          uv run --locked pytest
        working-directory: packages/python

      - name: Build wheel and source distribution
        run: uv build
        working-directory: packages/python

      - name: Validate wheel and extracted source distribution
        run: uv run --locked --python 3.11 python scripts/validate_dist.py --python-version 3.11
        working-directory: packages/python

      - name: Install and import the built wheel
        run: |
          uv venv --python 3.11 ../../.tmp/release-wheel
          uv pip install --python ../../.tmp/release-wheel/bin/python dist/*.whl
          ../../.tmp/release-wheel/bin/python -I -c 'import kisnet_ytm; assert kisnet_ytm.list_kinds()[0].name == "국채"'
        working-directory: packages/python

      - name: Upload Python distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-distributions-${{ needs.metadata.outputs.package_version }}
          path: packages/python/dist/*
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs:
      - metadata
      - python_validation
    environment:
      name: pypi
      url: https://pypi.org/project/kisnet-ytm/${{ needs.metadata.outputs.package_version }}/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-distributions-${{ needs.metadata.outputs.package_version }}
          path: dist

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.21"

      - name: Publish Python package
        shell: bash
        run: uv publish --check-url https://pypi.org/simple/ --trusted-publishing always dist/*
