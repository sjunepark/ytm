name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing source tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.package.outputs.package_name }}
      package_version: ${{ steps.package.outputs.package_version }}
      source_tag: ${{ steps.package.outputs.source_tag }}

    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Read package metadata
        id: package
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            SOURCE_TAG="$DISPATCH_TAG"
          else
            SOURCE_TAG="$GITHUB_REF_NAME"
          fi

          if [ "$SOURCE_TAG" != "v$PACKAGE_VERSION" ]; then
            echo "Tag $SOURCE_TAG does not match package version v$PACKAGE_VERSION." >&2
            exit 1
          fi

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "source_tag=$SOURCE_TAG" >> "$GITHUB_OUTPUT"

  npm_validation:
    runs-on: ubuntu-latest
    needs: metadata

    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.metadata.outputs.source_tag }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build npm CLI bundle
        run: bun run build

      - name: Validate tool surface
        run: bun run validate

      - name: Check npm package contents
        run: npm pack --dry-run

  publish:
    runs-on: ubuntu-latest
    needs:
      - metadata
      - npm_validation
    permissions:
      contents: read
      id-token: write
    env:
      PACKAGE_NAME: ${{ needs.metadata.outputs.package_name }}
      PACKAGE_VERSION: ${{ needs.metadata.outputs.package_version }}

    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.metadata.outputs.source_tag }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node for npm publishing
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use pinned npm with trusted publishing support
        run: |
          npm install --global npm@11.6.2
          npm --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build npm CLI bundle
        run: bun run build

      - name: Publish npm package
        run: |
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published; skipping npm publish."
          else
            npm publish --access public
          fi
