name: Release npm

on:
  push:
    tags:
      - "node-v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing Node component tag, for example node-v0.2.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: npm-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.package.outputs.package_name }}
      package_version: ${{ steps.package.outputs.package_version }}
      source_tag: ${{ steps.package.outputs.source_tag }}

    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Python for metadata validation
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"

      - name: Validate component metadata
        id: package
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          PACKAGE_NAME=$(node -p "require('./packages/node/package.json').name")
          PACKAGE_VERSION=$(node -p "require('./packages/node/package.json').version")
          PYTHON_VERSION=$(python -c 'import tomllib; print(tomllib.load(open("packages/python/pyproject.toml", "rb"))["project"]["version"])')

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            SOURCE_TAG="$DISPATCH_TAG"
          else
            SOURCE_TAG="$GITHUB_REF_NAME"
          fi

          if [ "$PACKAGE_VERSION" != "$PYTHON_VERSION" ]; then
            echo "Node $PACKAGE_VERSION does not match Python $PYTHON_VERSION." >&2
            exit 1
          fi
          if [ "$SOURCE_TAG" != "node-v$PACKAGE_VERSION" ]; then
            echo "Tag $SOURCE_TAG does not match Node version node-v$PACKAGE_VERSION." >&2
            exit 1
          fi

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "source_tag=$SOURCE_TAG" >> "$GITHUB_OUTPUT"

  npm_validation:
    runs-on: ubuntu-latest
    needs: metadata

    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ needs.metadata.outputs.source_tag }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build npm CLI bundle
        run: bun run build:node

      - name: Validate tool and shared contract surfaces
        run: bun run contracts:check && bun run validate:node

      - name: Check npm package contents
        run: bun run pack:node

  publish:
    runs-on: ubuntu-latest
    needs:
      - metadata
      - npm_validation
    environment:
      name: npm
      url: https://www.npmjs.com/package/@sjunepark/ytm/v/${{ needs.metadata.outputs.package_version }}
    permissions:
      contents: read
      id-token: write
    env:
      PACKAGE_NAME: ${{ needs.metadata.outputs.package_name }}
      PACKAGE_VERSION: ${{ needs.metadata.outputs.package_version }}

    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ needs.metadata.outputs.source_tag }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Set up Node for npm trusted publishing
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use pinned npm with trusted publishing support
        run: |
          npm install --global npm@11.6.2
          npm --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build npm CLI bundle
        run: bun run build:node

      - name: Publish npm package
        shell: bash
        working-directory: packages/node
        run: |
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published; skipping npm publish."
            exit 0
          fi

          set +e
          npm publish --access public 2>&1 | tee npm-publish.log
          publish_status=${PIPESTATUS[0]}
          set -e

          if [ "$publish_status" -eq 0 ]; then
            exit 0
          fi
          if grep -qi "previously published versions: $PACKAGE_VERSION" npm-publish.log; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published; skipping npm publish."
            exit 0
          fi
          exit "$publish_status"
